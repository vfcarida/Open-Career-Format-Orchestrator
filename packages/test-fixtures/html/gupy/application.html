<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Gupy Application Page</title>
</head>
<body>
  <div class="gupy-application">
    <h1 class="job-title">Fullstack Developer</h1>
    <div class="job-company">Tech Startup Inc</div>
    <form class="apply-form">
      <input type="text" name="resumeUrl" placeholder="Link to Resume" />
      <button type="submit" class="apply-btn">Submit Application</button>
    </form>
    <div class="success-message" style="display:none;">Application submitted successfully!</div>
  </div>
</body>
</html>
