apiVersion: akcp.policy/v1
kind: Policy
metadata:
  name: "summarize_ticket"
  description: "Allows the agent to summarize tickets for human handoff"
spec:
  effect: allow
  actions:
    - mcp:call_tool:customer-support.summarize_ticket
  conditions:
    - field: riskLevel
      operator: in
      value: ["low"]
