compile:
  profile: "it-operations"

  sources:
    - type: okf-directory
      path: ./services
    - type: okf-directory
      path: ./runbooks
    - type: okf-directory
      path: ./incidents
    - type: okf-directory
      path: ./policies

  targets:
    - type: context-pack
      out: dist/agent-knowledge-ir.json
    - type: mcp-resources
      out: dist/mcp-resources.json
    - type: openwiki
      out: dist/openwiki
    - type: dashboard-metadata
      out: dist/dashboard-meta.json

controlPlane:
  policies:
    disableDangerousTools: true
    requireApprovalFor:
      - execute_remediation
      - restart_service
      - deploy_service
      - execute_command
    disableInLogs:
      - "credential"
      - "password"
      - "secret"
      - "token"
