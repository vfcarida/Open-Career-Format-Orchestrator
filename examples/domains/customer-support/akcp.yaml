bundle:
  name: customer-support-example
  version: "0.1.0"
  description: "Example AKCP bundle for an L1/L2 Customer Support Agent."
  profile: customer-support

compile:
  sources:
    - type: okf-directory
      path: ./sample-data/.okf
  targets:
    - type: context-pack
      out: dist/context-pack.json
    - type: mcp-resources
      out: dist/mcp-resources.json
    - type: policy-bundle
      out: dist/policy-bundle.json
    - type: openwiki
      out: dist/openwiki
    - type: agent-instructions
      out: dist/AGENTS.md

controlPlane:
  policies:
    # We enable the PII Redaction plugin globally to scrub sensitive data from output contexts
    enablePiiRedaction: true
    # We apply specific behavioral rules for the agent
    customPolicyFiles:
      - ./policy.ts

privacy:
  defaultPiiMode: "redact"
  blockedPiiClasses: 
    - "EMAIL"
    - "PHONE"
    - "SSN"
    - "CREDIT_CARD"
