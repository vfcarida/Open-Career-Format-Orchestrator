name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate YAML
        run: pnpm validate:yaml

      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit Tests
        run: pnpm test -- --run

      - name: Contract Tests
        run: pnpm test:contract

      - name: Validate Sample Bundle
        run: pnpm validate:bundle --bundle sample-data/.okf --format json

      - name: Migrate Bundle Dry Run
        run: pnpm migrate:bundle --bundle sample-data/.okf --check
