name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate YAML
        run: pnpm validate:yaml

      - name: Identity Check
        run: pnpm check:identity

      - name: Docs Check
        run: pnpm check:docs

      - name: Links Check
        run: pnpm check:links

      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit Tests & Coverage
        run: pnpm coverage

      - name: Security Tests
        run: pnpm test:security

      - name: Contract Tests
        run: pnpm test:contract

      - name: Conformance Tests
        run: pnpm test:conformance

      - name: Validate Career Bundle
        run: pnpm akcp validate --config examples/domains/career/akcp.yaml

      - name: Compile Career Bundle
        run: pnpm akcp compile --config examples/domains/career/akcp.yaml

      - name: Validate IT Ops Bundle
        run: pnpm akcp validate --config examples/domains/it-operations/akcp.yaml

      - name: Compile IT Ops Bundle
        run: pnpm akcp compile --config examples/domains/it-operations/akcp.yaml

      - name: Compile Customer Support Bundle
        run: pnpm akcp compile --config examples/domains/customer-support/akcp.yaml

      - name: Conformance Run
        run: pnpm akcp conformance run

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: sbom.spdx.json
