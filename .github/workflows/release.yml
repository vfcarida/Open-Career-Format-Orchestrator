name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege permissions required for this workflow:
#   contents: write  — create GitHub Release assets
#   id-token: write  — OIDC token for Sigstore/npm provenance
#   attestations: write — GitHub artifact attestation API
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      # ── Supply chain: SBOM ──────────────────────────────────────────────────
      # Generate a Software Bill of Materials in SPDX-JSON format using Syft.
      # The SBOM is saved as sbom.spdx.json and attached to the GitHub Release.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false # We attach manually via release upload below

      # ── Supply chain: Build Provenance Attestation ──────────────────────────
      # Attests the built dist/ artifacts using GitHub's attestation API
      # (backed by Sigstore). Consumers can verify with:
      #   gh attestation verify <artifact> --repo <owner>/<repo>
      - name: Attest Build Provenance
        id: attest-dist
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'packages/*/dist/**'

      # ── Supply chain: SBOM Attestation ──────────────────────────────────────
      # Separately attest the SBOM itself so consumers can verify its integrity.
      - name: Attest SBOM
        id: attest-sbom
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'sbom.spdx.json'

      # ── Publish to npm with provenance ──────────────────────────────────────
      # --provenance attaches a Sigstore-backed provenance attestation to each
      # published npm package, allowing consumers to verify origin via:
      #   npm audit signatures
      - name: Publish to NPM
        run: pnpm -r publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Release with SBOM asset ──────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          generate_release_notes: true
          files: |
            sbom.spdx.json
