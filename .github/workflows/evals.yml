name: Evals Regression Check

on:
  pull_request:
    paths:
      - "packages/mcp-profile-server/src/**"
      - "packages/mcp-automation-server/src/**"
      - "packages/evals/src/**"
      - "packages/core/src/contracts/**"

permissions:
  contents: read

jobs:
  run-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @ocf/core build

      - name: Build Dashboard Server
        run: pnpm --filter @ocf/dashboard build

      - name: Run Evals
        run: pnpm evals
        env:
          AUTOMATION_RUNTIME_MODE: sandbox
